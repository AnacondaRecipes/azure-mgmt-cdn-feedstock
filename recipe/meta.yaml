{% set name = "azure-mgmt-cdn" %}
{% set version = "12.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.zip
  sha256: b7c3ee2189234b4af51ace2924927c5fd733f3de748a642d6d5040067c8c9ddd

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<36]

requirements:
  host:
    - setuptools
    - wheel
    - python
    - pip
  run:
    - python
    - msrest >=0.6.21
    - azure-common >=1.1,<2
    - azure-mgmt-core>=1.3.0,<2.0.0

tests:
  imports:
    - azure.mgmt.cdn
    - azure.mgmt.cdn.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure CDN Management Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: Microsoft Azure CDN Management Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
